apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: exbanka-3
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: exbanka
    spec:
      containers:
        - name: backend
          image: ghcr.io/raf-si-2025/exbanka-3-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: exbanka-app-config
            - secretRef:
                name: exbanka-app-secrets
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
