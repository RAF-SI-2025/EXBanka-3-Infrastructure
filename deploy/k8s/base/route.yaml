# Gateway API HTTPRoute for the elab cluster (Envoy Gateway), replacing the
# nginx Ingress. Each backend rule matches PathPrefix /<slug>/api and rewrites
# the /<slug> prefix away (ReplacePrefixMatch /api), so the service receives the
# /api/v1/... path it serves. The frontend is the catchall (/) with NO rewrite.
#
# Why match /<slug>/api and not just /<slug>: the Vue SPA has page routes that
# start with a service name (e.g. /client/login, /client). Matching only
# /<slug>/api means those SPA pages fall through to the frontend instead of
# being shadowed by the API backend. The frontend only ever calls the API at
# /<slug>/api/v1/... (see resolveApiUrl), so no API traffic is lost.
#
# parentRefs.name banka-gw + host exbanka-3.radenkovic.rs confirmed against the
# live cluster (kubectl get gateway -A; listener https-exbanka-3 + cert
# exbanka-3-tls already exist).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: exbanka-3
  namespace: exbanka-3
  labels:
    app.kubernetes.io/name: exbanka
    app.kubernetes.io/part-of: exbanka
spec:
  parentRefs:
    - name: banka-gw
      namespace: envoy-gateway-system
  hostnames:
    - exbanka-3.radenkovic.rs
  rules:
    - matches:
        - path: {type: PathPrefix, value: /auth/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: auth-service
          port: 8081
    - matches:
        - path: {type: PathPrefix, value: /account/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: account-service
          port: 8084
    - matches:
        - path: {type: PathPrefix, value: /client/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: client-service
          port: 8083
    - matches:
        - path: {type: PathPrefix, value: /employee/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: employee-service
          port: 8082
    - matches:
        - path: {type: PathPrefix, value: /transfer/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: transfer-service
          port: 8086
    - matches:
        - path: {type: PathPrefix, value: /payment/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: payment-service
          port: 8087
    - matches:
        - path: {type: PathPrefix, value: /exchange/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: exchange-service
          port: 8088
    - matches:
        - path: {type: PathPrefix, value: /loan/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: loan-service
          port: 8089
    - matches:
        - path: {type: PathPrefix, value: /core/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: backend
          port: 8080
    # Inbound inter-bank protocol (si-tx-proto, Celina 5). Professor mandate:
    # every externally-reachable URL is https://<domain>/<service-name>/... , so
    # partner banks reach our protocol under the /exchange slug — the same
    # service-name the frontend already uses for the OTC UI (/exchange/api/...).
    #
    # exchange-service mounts the protocol at ROOT (/interbank, /public-stock,
    # /negotiations, /user/ — see cmd/server/main.go), so each rule strips the
    # /exchange prefix back down to /<route> with ReplacePrefixMatch. We keep
    # these as explicit per-route rules (rather than broadening /exchange/api to
    # /exchange) so the working frontend rule is left untouched.
    #
    # PathPrefix matches per path element, so /exchange/interbank does NOT match
    # the local UI route /exchange/api/v1/interbank-otc. The partner-facing base
    # URL we hand out is therefore https://exbanka-3.radenkovic.rs/exchange
    # (the partner appends /interbank, /negotiations, … onto it).
    - matches:
        - path: {type: PathPrefix, value: /exchange/interbank}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /interbank}
      backendRefs:
        - name: exchange-service
          port: 8088
    - matches:
        - path: {type: PathPrefix, value: /exchange/public-stock}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /public-stock}
      backendRefs:
        - name: exchange-service
          port: 8088
    - matches:
        - path: {type: PathPrefix, value: /exchange/negotiations}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /negotiations}
      backendRefs:
        - name: exchange-service
          port: 8088
    - matches:
        - path: {type: PathPrefix, value: /exchange/user}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /user}
      backendRefs:
        - name: exchange-service
          port: 8088
    - matches:
        - path: {type: PathPrefix, value: /notification/api}
      filters:
        - type: URLRewrite
          urlRewrite:
            path: {type: ReplacePrefixMatch, replacePrefixMatch: /api}
      backendRefs:
        - name: notification-service
          port: 8090
    # Frontend SPA + /config.js + static assets — catchall, no rewrite, kept last.
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - name: frontend
          port: 80
