apiVersion: v1
kind: Secret
metadata:
  name: exbanka-app-secrets
  namespace: exbanka-3
  labels:
    app.kubernetes.io/part-of: exbanka
type: Opaque
stringData:
  # DB_USER / DB_PASSWORD are intentionally NOT in this Secret. They come from
  # the Crunchy operator-generated Secret `db-pguser-banking-service` in the
  # same namespace; each Deployment pulls them via secretKeyRef.
  # JWT_SECRET is required at startup — services fail-fast if it is empty.
  # There is no source-tree default; this must be a real value before apply.
  JWT_SECRET: change-me
  # Backend reads this exact name; the previous example said ALPHA_VANTAGE_KEY,
  # which the code never reads.
  ALPHA_VANTAGE_API_KEY: change-me
  REDIS_PASSWORD: change-me
  # Shared secret for service-to-service notification emits. The emitting
  # services send it in the X-Internal-Key header; notification-service requires
  # it on POST /internal/v1/notifications. Both sides read the same key from this
  # Secret, so they must match — set one real value here.
  INTERNAL_API_KEY: change-me
  # PARTNER_BANKS_JSON is a JSON array of partner-bank entries. Contains per-
  # partner inbound/outbound API keys, so it lives in the Secret. Use "[]" for
  # no partners.
  #
  # `code` is the partner's 3-digit routing number as a JSON NUMBER (not a
  # quoted string — RoutingNumber is a plain int and won't unmarshal a string).
  # `baseUrl` is the partner's protocol BASE with NO trailing /interbank: the
  # client appends /interbank, /negotiations, /public-stock, /user itself.
  # `outboundKey` = the key the partner issued to us (we send it to them);
  # `inboundKey`  = the key we issued to the partner (we require it from them).
  # Two partners must not share the same inboundKey (registry refuses to load).
  # Example single-partner shape:
  # [{"code":222,"baseUrl":"https://partner.example/api/v3/cross-bank-protocol","outboundKey":"<key-they-issued-to-us>","inboundKey":"<key-we-issued-to-them>","displayName":"Partner Bank"}]
  PARTNER_BANKS_JSON: "[]"
