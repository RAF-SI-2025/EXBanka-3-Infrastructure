apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exbanka
  namespace: exbanka-3
  labels:
    app.kubernetes.io/name: exbanka
    app.kubernetes.io/part-of: exbanka
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    # URL shape required by the cluster handoff: https://<domain>/<slug>/api/...
    # Each slug regex captures the remainder so the upstream service sees the
    # original /api/v1/... path it already serves — no backend code change.
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    # Replace exbanka.local with the domain provided by the professor.
    - host: exbanka.local
      http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  name: http
          - path: /account(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: account-service
                port:
                  name: http
          - path: /client(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client-service
                port:
                  name: http
          - path: /employee(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: employee-service
                port:
                  name: http
          - path: /transfer(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: transfer-service
                port:
                  name: http
          - path: /payment(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: payment-service
                port:
                  name: http
          - path: /exchange(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: exchange-service
                port:
                  name: http
          - path: /loan(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: loan-service
                port:
                  name: http
          - path: /core(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  name: http
          # SPA + /config.js (served by the frontend container's nginx).
          # Must remain last so it does not shadow the per-slug routes above.
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  name: http
